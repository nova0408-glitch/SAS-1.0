<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAS 1.0 - Admin Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="login-container">
        <h1>Staff Attendance System</h1>
        <div class="login-card">
            <form id="loginForm" method="POST" action="../backend/login.php">
                <input type="email" name="email" placeholder="Admin Email" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="holo-btn">Login</button>
            </form>
            <p class="login-note">Only admins can login here.</p>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>

</html>
